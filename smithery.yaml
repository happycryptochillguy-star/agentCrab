startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      privateKey:
        type: string
        description: "Optional. Your Ethereum private key (0x...). If not set, use connect_wallet or create_wallet tools after starting."
      apiUrl:
        type: string
        description: "agentCrab API URL (default: https://api.agentcrab.ai/polymarket)"
  commandFunction: |-
    (config) => ({
      command: 'agentcrab-mcp',
      env: {
        ...(config.privateKey ? { AGENTCRAB_PRIVATE_KEY: config.privateKey } : {}),
        ...(config.apiUrl ? { AGENTCRAB_API_URL: config.apiUrl } : {})
      }
    })
  exampleConfig:
    apiUrl: "https://api.agentcrab.ai/polymarket"
