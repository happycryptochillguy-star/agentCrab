# HTTPS reverse proxy for agentCrab API
server {
    listen 443 ssl http2;
    server_name api.agentcrab.ai;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/cert.key;

    if ($https != on) {
        return 302 https://$host$request_uri;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        ## ===== Pass-through required headers =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        ## ===== Disable API caching =====
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate, max-age=0" always;

        ## ===== Disable nginx-side buffering =====
        proxy_buffering off;

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    access_log /var/log/nginx/agentcrab-access.log;
    error_log  /var/log/nginx/agentcrab-error.log;
}
