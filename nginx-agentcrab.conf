# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name api.agentcrab.ai;

    ssl_certificate     /etc/nginx/cert/agentcrab.pem;
    ssl_certificate_key /etc/nginx/cert/agentcrab.key;

    if ($https != on) {
        return 302 https://$host$request_uri;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /mcp {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location / {
        ## ===== 必须透传这些 header =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        ## ===== 禁止缓存 API =====
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-store, no-cache, must-revalidate, max-age=0" always;

        ## ===== 关闭 nginx 侧缓存 =====
        proxy_buffering off;

        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    access_log /data/logs/nginx_logs/agentclab-info.log;
    error_log /data/logs/nginx_logs/agentclab-error.log;
}
